<!DOCTYPE html>
<html lang="fr">
    <link rel="stylesheet" href="style.css">
  <head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</script>
<section class="auth-section">
    <div class="auth-container">
        <h2>Commencez vos paiements</h2>
        <p>Remplissez vos informations pour finaliser votre inscription sur WhatsApp.</p>

        <form id="form-inscription" style="max-width: 400px; margin: auto; display: flex; flex-direction: column; gap: 15px;">
    
    <label for="nom">Nom complet</label>
    <input type="text" name="nom" id="nom" placeholder="Ex: Jean Mukendi" required>

    <label for="email">Adresse Email</label>
    <input type="email" name="email" id="email" placeholder="Ex: jean@mail.com" required>

    <label for="telephone">Telephone</label>
    <input type="tel" name="telephone" id="telephone" placeholder="Ex: +243 812 000 000" required>

    <label for="service">Service souhaité</label>
    <select name="service" id="service" required>
        <option value="" disabled selected>Choisissez un service...</option>
        <option value="Netflix">Abonnement Numerique</option>
        <option value="Canva">Paiement E-commerce</option>
        <option value="Alibaba">Paiement Internationaux</option>
        <option value="Autre">Autre service</option>
    </select>
    <a href="Dashboard.html">
    <button type="submit" id="submit-btn" style="background-color: #2563eb; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
        S'inscrire et Commander
    </button>
</form>
    </div>
</section>
<script>
    // 1. Ton lien Google que tu as copié
    const scriptURL = 'TON_LIEN_QUI_FINIT_PAR_EXEC';
    
    // 2. On sélectionne ton formulaire
    const form = document.querySelector('form');

    form.addEventListener('submit', e => {
        e.preventDefault(); // Empêche le rechargement de la page
        
        // On peut changer le texte du bouton pour montrer que ça charge
        const btn = form.querySelector('button');
        btn.disabled = true;
        btn.innerText = "Inscription en cours...";

        // 3. Envoi des données vers Google Sheets
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
          .then(response => {
              console.log('Succès !', response);
              // 4. REDIRECTION vers le dashboard
              window.location.href = "dashboard.html"; 
          })
          .catch(error => {
              console.error('Erreur !', error.message);
              alert("Désolé, une erreur est survenue. Réessayez.");
              btn.disabled = false;
              btn.innerText = "S'inscrire et Commander";
          });
    });
</script>
